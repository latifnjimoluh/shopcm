<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne — ShopCM</title>
    <link rel="stylesheet" href="/shopcm/assets/css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        .offline-box {
            max-width: 480px;
            background: #fff;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        h1 { color: #1B5E20; font-size: 1.6rem; margin-bottom: 0.5rem; }
        p  { color: #757575; margin-bottom: 1.5rem; }
        .btn-retry {
            background: #1B5E20;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-retry:hover { background: #2E7D32; }
    </style>
</head>
<body>
    <div class="offline-box">
        <div class="offline-icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>
            ShopCM n'a pas pu se connecter au réseau.<br>
            Vérifiez votre connexion Internet et réessayez.
        </p>
        <button class="btn-retry" onclick="window.location.reload()">
            🔄 Réessayer
        </button>
        <p style="margin-top:1.5rem;font-size:0.85rem;">
            <a href="/shopcm/index.php" style="color:#1B5E20;">← Retour à l'accueil</a>
        </p>
    </div>

    <footer style="margin-top:2rem;color:#BDBDBD;font-size:0.85rem;">
        ShopCM &mdash; TP Sécurité Web &mdash; Mai 2026
    </footer>
</body>
</html>
